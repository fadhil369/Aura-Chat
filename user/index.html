<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Chat – Connect with anyone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <div class="card">
            <div class="logo">
                <div class="logo-icon">
                    <img src="aura_chat_logo_1774281112940.png" alt="Aura Logo" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <span>Aura Chat</span>
            </div>

            <!-- Tab navigation -->
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="auth-form" onsubmit="handleLogin(event)">
                <h2>Welcome back</h2>
                <p class="subtitle">Sign in to your account</p>

                <div class="input-group">
                    <label for="login-username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="login-password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-pw" onclick="togglePassword('login-password', this)">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                    </div>
                </div>

                <div id="login-alert" class="alert hidden"></div>

                <button type="submit" class="btn-primary" id="btn-login">
                    <span class="btn-text">Sign In</span>
                    <div class="btn-loader hidden"></div>
                </button>

                <p class="form-footer">Don't have an account? <a href="#" onclick="switchTab('register')">Register</a></p>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="auth-form hidden" onsubmit="handleRegister(event)">
                <h2>Create account</h2>
                <p class="subtitle">Join Aura Chat today</p>

                <div class="input-group">
                    <label for="reg-username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <input type="text" id="reg-username" placeholder="Choose a username" required autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="reg-password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="currentColor" stroke-width="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                        <input type="password" id="reg-password" placeholder="Choose a password" required autocomplete="new-password">
                        <button type="button" class="toggle-pw" onclick="togglePassword('reg-password', this)">
                            <svg viewBox="0 0 24 24" fill="none"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/></svg>
                        </button>
                    </div>
                </div>

                <div id="reg-alert" class="alert hidden"></div>

                <button type="submit" class="btn-primary" id="btn-register">
                    <span class="btn-text">Create Account</span>
                    <div class="btn-loader hidden"></div>
                </button>

                <p class="form-footer">Already have an account? <a href="#" onclick="switchTab('login')">Sign in</a></p>
            </form>

            <!-- Success screen (Keep this for simple sign out if needed) -->
            <div id="screen-success" class="success-screen hidden">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M22 4 12 14.01l-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
                <h2 id="success-title">Login Successful!</h2>
                <p id="success-msg">Welcome back, <strong id="success-username"></strong>!</p>
                <button class="btn-primary" onclick="proceedToChat()">Go to Chat</button>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="screen-chat" class="chat-screen hidden">
        <div class="chat-sidebar">
            <div class="user-profile">
                <div class="avatar" id="my-avatar">U</div>
                <div class="user-info">
                    <div class="username" id="my-username">Username</div>
                    <div class="chat-id">ID: <span id="my-chat-id">1234567890</span></div>
                </div>
                <button class="logout-btn" onclick="logout()" title="Logout">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
            </div>
            <div class="search-box">
                <input type="text" id="contact-search" placeholder="Enter 10-digit Chat ID...">
                <button onclick="searchContact()">Add</button>
            </div>
            <div class="contact-list" id="contact-list">
                <!-- Contacts will appear here -->
            </div>
        </div>
        <div class="chat-main">
            <div id="chat-header-info" class="chat-header hidden">
                <button class="back-btn mobile-only" onclick="backToList()">
                    <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </button>
                <div class="avatar-small" id="target-avatar">T</div>
                <span id="target-contact-name">Select a contact</span>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="placeholder-text" id="chat-placeholder">Search for a 10-digit ID to add a contact and start chatting.</div>
            </div>
            <div class="chat-input-area hidden" id="chat-input-area">
                <input type="text" id="message-input" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
    <script src="chat.js"></script>
</body>
</html>
